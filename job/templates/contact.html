{% load static %}

{% block body %}

{% include 'navigation.html' %}
<link rel="stylesheet" href="#">

<style>
	.center{
	position:absolute;
	top:50%;
	left:50%;
	transform: translate(-50%,-50%);
	}

    .mydiv:hover {
        box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.3);
        transform: translateY(-20px);
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .centered {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* style for the 'Send Message' button */
    .btn-primary {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 12px 30px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 18px;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #45a049;
        transform: scale(1.1);
    }

    /* Background design for the section */
    .slider-area {
        background-image: url("{% static 'images/images.jpeg' %}");
        background-size: cover;
        background-position: center;
        padding: 120px 0;
    }

    .hero-cap h2 {
        font-size: 40px;
        color: white;
        font-weight: bold;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
    }

    /* Form styling */
    .form-control {
        border-radius: 8px;
        border: 1px solid #ddd;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.8);
    }

    /* Styling for the contact info sections */
    .col-sm-3.mydiv {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
    }

    .col-sm-3.mydiv:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

</style>


<div class="container-fliud" style="margin-top:0%">
    <img src="{% static 'images/jobs.avif' %}"  style="height:400px;width:1520px">
	<div class="center" ><h1 class="text-white font-weight-bold">Contact Us</h1>
	</div>
</div><br>

<section class="site-section" id="next-section">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 mb-5 mb-lg-0">
                <form id="contactForm" action="#" method="POST" class="">

                    <div class="row form-group">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="text-black" for="fname">First Name</label>
                            <input type="text" id="fname" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="text-black" for="lname">Last Name</label>
                            <input type="text" id="lname" class="form-control" required>
                        </div>
                    </div>

                    <div class="row form-group">
                        <div class="col-md-12">
                            <label class="text-black" for="email">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                    </div>

                    <div class="row form-group">
                        <div class="col-md-12">
                            <label class="text-black" for="subject">Subject</label>
                            <input type="text" id="subject" class="form-control">
                        </div>
                    </div>

                    <div class="row form-group">
                        <div class="col-md-12">
                            <label class="text-black" for="message">Message</label>
                            <textarea name="message" id="message" cols="30" rows="7" class="form-control" placeholder="Write your notes or questions here..."></textarea>
                        </div>
                    </div>

                    <div class="row form-group">
                        <div class="col-md-12">
                            <input type="submit" value="Send Message" class="btn btn-primary btn-md text-white">
                        </div>
                    </div>

                </form>
            </div>
            <div class="col-lg-5 ml-auto">
                <div class="p-4 mb-3 bg-white">
                    <p class="mb-0 font-weight-bold"><i class="fa fa-map-marker"></i> Address</p>
                    <p class="mb-4">Sidhu Bhavan Road, Ahmedabad.</p>

                    <p class="mb-0 font-weight-bold">Phone</p>
                    <p class="mb-1"><a href="#"><h3>+91 9023957445</h3></a></p>
                    <p class="mb-4">Mon to Fri 10am to 7pm</p>

                    <p class="mb-1 font-weight-bold">Email Address</p>
                    <p class="mb-0"><a href="#"><h4>amanshaikh03@gmail.com</h4></a></p>
                    <p>Send us your query anytime!</p>

                </div>
            </div>
        </div>
    </div>
</section><hr>

{% include 'footer.html' %}

{% endblock %}

<script>
    document.getElementById('contactForm').addEventListener('submit', function(event) {
        event.preventDefault();  // Prevent actual form submission

        // Get form field values
        var fname = document.getElementById('fname').value;
        var lname = document.getElementById('lname').value;
 

        // Construct the message to show in the alert box
        var alertMessage = "Thank you, " + fname + " " + lname + "!\n\n";
        alertMessage += "We have successfully received your message with the following details:\n";
        

        // Show the alert box with the message
        alert(alertMessage);
    });
</script>
