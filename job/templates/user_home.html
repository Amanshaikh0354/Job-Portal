{% load static %}

{% block body %}

{% include 'user_navigation.html' %}

<marquee style="font-family: 'Monotype Corsiva'; font-size: 25px; color: darkcyan; background-color: black; font-weight: bold; margin-top: 0%;">
    Profile
</marquee>
<hr>

<div class="container">
    <div class="row">
        <div class="col-sm-8">
            <form class="mt-5" name="signup" method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="fname">First Name</label>
                        <input type="text" class="form-control" id="fname" name="fname" value="{{student.user.first_name}}" required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="lname">Last Name</label>
                        <input type="text" class="form-control" id="lname" name="lname" value="{{student.user.last_name}}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label for="contact">Contact</label>
                        <input type="text" class="form-control" id="contact" name="contact" value="{{student.mobile}}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label for="email">Email ID</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{student.user.username}}" readonly required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Gender</label>
                        <div class="border rounded p-2" style="border: 1px solid #ced4da;">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male" value="Male" 
                                    {% if student.gender == "Male" %} checked {% endif %}>
                                <label class="form-check-label" for="male">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female" value="Female"
                                    {% if student.gender == "Female" %} checked {% endif %}>
                                <label class="form-check-label" for="female">Female</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="image">Profile Image</label>
                        <input type="file" class="form-control-file" id="image" name="image" accept="image/*">
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary" style="width: 120px; padding: 10px;">
                        Submit
                    </button>
                </div>
            </form>
        </div><!--col 1 end-->

        <div class="col-sm-4 mt-5 text-center">
            <img src="{{student.image.url}}" class="img-fluid rounded" style="max-width: 300px; max-height: 300px;" alt="Profile Image">
        </div>
    </div>
</div>

{% include 'footer.html' %}

{% if error == "no" %}
<script>
    alert("Profile Updated Successfully");
    window.location = '{% url "user_home" %}';
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Something went wrong, Please Try Again...");
</script>
{% endif %}

{% endblock %}
